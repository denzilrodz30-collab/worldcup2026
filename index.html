<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 · IST Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   THEME TOKENS
═══════════════════════════════════ */
:root {
  --gold: #F5A623;
  --gold-dim: rgba(245,166,35,0.12);
  --gold-border: rgba(245,166,35,0.3);
  --red: #E8394A;
  --red-dim: rgba(232,57,74,0.1);
  --red-border: rgba(232,57,74,0.3);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.1);
  --accent-blue: #3B82F6;
}
[data-theme="dark"] {
  --bg: #060C18;
  --bg-mid: #0C1828;
  --bg-card: rgba(255,255,255,0.035);
  --bg-card-hover: rgba(255,255,255,0.065);
  --bg-surface: rgba(255,255,255,0.05);
  --bg-input: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.16);
  --text-primary: #EEF2F8;
  --text-secondary: rgba(238,242,248,0.58);
  --text-muted: rgba(238,242,248,0.3);
  --text-white: #fff;
  --header-bg: rgba(6,12,24,0.92);
  --hero-bg: linear-gradient(135deg,#101d38 0%,#080f1e 55%,#100818 100%);
  --score-box-bg: rgba(255,255,255,0.06);
  --score-box-border: rgba(255,255,255,0.1);
  --pill-active-bg: #fff;
  --pill-active-color: #060C18;
  --logo-invert: 0;
}
[data-theme="light"] {
  --bg: #F0F4FA;
  --bg-mid: #E3EAF5;
  --bg-card: rgba(255,255,255,0.85);
  --bg-card-hover: rgba(255,255,255,1);
  --bg-surface: rgba(0,0,0,0.04);
  --bg-input: rgba(0,0,0,0.05);
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.18);
  --text-primary: #111827;
  --text-secondary: rgba(17,24,39,0.62);
  --text-muted: rgba(17,24,39,0.36);
  --text-white: #111827;
  --header-bg: rgba(240,244,250,0.92);
  --hero-bg: linear-gradient(135deg,#dce8fa 0%,#e8edf8 55%,#ead8f5 100%);
  --score-box-bg: rgba(0,0,0,0.05);
  --score-box-border: rgba(0,0,0,0.1);
  --pill-active-bg: #111827;
  --pill-active-color: #fff;
  --logo-invert: 0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  transition: background 0.3s, color 0.3s;
}

/* ── DENZ BYLINE ── */
.byline-bar {
  background: var(--red);
  padding: 5px 20px;
  text-align: center;
}
.byline-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
}
.byline-text span { color: #fff; font-weight: 800; }

/* ── HEADER ── */
.site-header {
  background: var(--header-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 0.5px solid var(--border);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 54px;
}
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--text-white);
  letter-spacing: 0.3px;
  line-height: 1;
}
.logo-sub { color: var(--gold); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.live-indicator { display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.live-label { font-size: 11px; color: var(--green); font-weight: 700; letter-spacing: 0.5px; }
.updated-lbl { font-size: 11px; color: var(--text-muted); }
.refresh-btn {
  font-size: 14px; background: var(--bg-surface); border: 0.5px solid var(--border);
  border-radius: 7px; color: var(--text-secondary); cursor: pointer;
  padding: 4px 9px; line-height: 1; transition: all 0.15s;
}
.refresh-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
.refresh-btn.spinning { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Theme toggle */
.theme-toggle {
  width: 36px; height: 20px; border-radius: 10px;
  background: var(--bg-surface); border: 0.5px solid var(--border);
  position: relative; cursor: pointer; flex-shrink: 0;
  transition: background 0.3s;
}
.theme-toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--text-muted); transition: all 0.3s;
}
[data-theme="light"] .theme-toggle { background: var(--gold-dim); border-color: var(--gold-border); }
[data-theme="light"] .theme-toggle::after { transform: translateX(16px); background: var(--gold); }
.theme-icon { font-size: 13px; user-select: none; cursor: pointer; }

/* ── HERO ── */
.countdown-hero {
  background: var(--hero-bg);
  border-bottom: 1px solid var(--red-border);
  padding: 22px 20px 20px;
  position: relative;
  overflow: hidden;
}
.countdown-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(232,57,74,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.countdown-inner { max-width: 960px; margin: 0 auto; position: relative; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.cd-left { flex: 1; min-width: 200px; }
.cd-eyebrow {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 10px;
  background: var(--gold-dim); border: 0.5px solid var(--gold-border);
  padding: 3px 10px; border-radius: 20px;
}
.cd-matchup {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px;
}
.cd-team {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 800;
  color: var(--text-white);
  letter-spacing: 0.3px;
  display: flex; align-items: center; gap: 8px;
}
.cd-team.fav { color: var(--red); }
.cd-vs { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.cd-meta { font-size: 12px; color: var(--text-secondary); }
.cd-tiles { display: flex; gap: 8px; }
.cd-tile {
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 12px 16px; text-align: center; min-width: 64px;
}
[data-theme="light"] .cd-tile {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.1);
}
.cd-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(26px,4vw,40px); font-weight: 800; color: var(--text-white); line-height: 1;
  font-variant-numeric: tabular-nums;
}
.cd-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

/* ── FAV BAR ── */
.fav-bar { background: var(--bg-mid); border-bottom: 0.5px solid var(--border); padding: 10px 20px; }
.fav-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.fav-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.fav-select {
  background: var(--bg-input); border: 0.5px solid var(--border);
  border-radius: 8px; color: var(--text-primary); font-size: 13px;
  padding: 5px 10px; cursor: pointer; flex: 1; min-width: 180px; max-width: 280px;
  font-family: 'Inter', sans-serif;
}
.fav-select:focus { outline: none; border-color: var(--red-border); }
/* Force option legibility in both themes */
[data-theme="dark"] .fav-select option {
  background: #0C1828;
  color: #EEF2F8;
}
[data-theme="light"] .fav-select option {
  background: #ffffff;
  color: #111827;
}
.fav-clear {
  font-size: 12px; color: var(--red); cursor: pointer; padding: 5px 12px;
  border: 0.5px solid var(--red-border); border-radius: 8px; background: var(--red-dim);
  display: none; white-space: nowrap;
}
.fav-clear.show { display: block; }
.fav-hint { font-size: 11px; color: var(--text-muted); }

/* ── PROGRESS ── */
.progress-bar-wrap { background: var(--bg-mid); border-bottom: 0.5px solid var(--border); padding: 8px 20px; }
.progress-bar-inner { max-width: 960px; margin: 0 auto; }
.progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.progress-text { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
.progress-pct { font-size: 11px; color: var(--text-muted); }
.progress-track { height: 3px; background: var(--border); border-radius: 2px; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--red), var(--gold)); transition: width 0.6s ease; }

/* ── DATE STRIP ── */
.date-strip-wrap {
  background: var(--bg); border-bottom: 0.5px solid var(--border);
  padding: 10px 0; overflow-x: auto; scrollbar-width: none;
}
.date-strip-wrap::-webkit-scrollbar { display: none; }
.date-strip { display: flex; gap: 4px; padding: 0 20px; width: max-content; }
.date-chip {
  display: flex; flex-direction: column; align-items: center;
  min-width: 46px; padding: 7px 8px; border-radius: 10px; cursor: pointer;
  border: 0.5px solid transparent; transition: all 0.15s;
}
.date-chip:hover { background: var(--bg-surface); border-color: var(--border); }
.date-chip.active { background: var(--red-dim); border-color: var(--red-border); }
.date-chip.today { border-color: var(--gold-border); }
.date-chip .dc-day { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.date-chip .dc-num { font-size: 17px; font-weight: 700; color: var(--text-primary); line-height: 1.2; font-family: 'Barlow Condensed', sans-serif; }
.date-chip.active .dc-num { color: var(--red); }
.date-chip.today .dc-num { color: var(--gold); }
.date-chip.has-matches .dc-dot { width: 4px; height: 4px; background: var(--text-muted); border-radius: 50%; margin-top: 3px; }
.date-chip.active .dc-dot { background: var(--red); }

/* ── STATS BAR ── */
.stats-bar { background: var(--bg-mid); border-bottom: 0.5px solid var(--border); }
.stats-inner {
  max-width: 960px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr); padding: 0 20px;
}
.stat-item { padding: 13px 10px; text-align: center; border-right: 0.5px solid var(--border); }
.stat-item:last-child { border-right: none; }
.stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--text-white); line-height: 1; }
.stat-num.gold { color: var(--gold); }
.stat-num.red { color: var(--red); }
.stat-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; margin-top: 2px; }

/* ── MAIN ── */
.main { max-width: 960px; margin: 0 auto; padding: 20px 20px 80px; }

/* ── CONTROLS ── */
.controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
.search-input {
  width: 100%; height: 38px; padding: 0 12px 0 38px;
  background: var(--bg-input); border: 0.5px solid var(--border);
  border-radius: 10px; color: var(--text-primary); font-size: 13px;
  font-family: 'Inter', sans-serif; transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { outline: none; border-color: var(--border-hover); }

/* ── PILL FILTERS ── */
.pill-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.pf {
  padding: 5px 14px; font-size: 12px; font-weight: 600; border-radius: 20px;
  border: 0.5px solid var(--border); background: var(--bg-surface);
  color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}
.pf:hover { border-color: var(--border-hover); color: var(--text-primary); }
.pf.active { background: var(--pill-active-bg); color: var(--pill-active-color); border-color: var(--pill-active-bg); }
.pf.active.red-active { background: var(--red); color: #fff; border-color: var(--red); }

/* ── SECTION HEADERS ── */
.section-head {
  display: flex; align-items: center; gap: 8px;
  padding: 18px 0 10px; border-top: 0.5px solid var(--border); margin-top: 4px;
}
.section-head:first-child { border-top: none; padding-top: 0; }
.phase-pill {
  font-size: 10px; font-weight: 700; padding: 3px 11px; border-radius: 20px;
  letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
}
.section-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

/* ── MATCH CARDS ── */
.match-card {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 7px;
  display: grid;
  grid-template-columns: 110px 1fr auto;
  align-items: center;
  gap: 14px;
  transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  cursor: default;
}
.match-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
[data-theme="light"] .match-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.match-card.live-card { border-color: rgba(34,197,94,0.35); background: var(--green-dim); }
.match-card.fav-card { border-left: 3px solid var(--red) !important; background: var(--red-dim); }
.match-card.final-card { border-color: var(--gold-border); background: var(--gold-dim); }

.meta-date { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.meta-venue { font-size: 11px; color: var(--text-secondary); line-height: 1.35; }
.meta-utc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* ── TEAM ROW ── */
.teams-col {}
.teams-row { display: flex; align-items: center; justify-content: center; gap: 0; }
.team { flex: 1; }
.team-name { font-size: 13px; font-weight: 700; color: var(--text-white); }
.team-name.is-fav { color: var(--red); }
.team.left .team-name { text-align: right; padding-right: 10px; }
.team.right .team-name { text-align: left; padding-left: 10px; }

/* ── SCORE BOX ── */
.score-box {
  min-width: 54px;
  background: var(--score-box-bg);
  border: 0.5px solid var(--score-box-border);
  border-radius: 8px; padding: 5px 9px;
  display: flex; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0;
}
.score-num { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: var(--text-white); }
.score-sep { font-size: 13px; color: var(--text-muted); }
.vs-text { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.live-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; color: var(--green); margin-top: 4px;
  letter-spacing: 0.3px;
}
.live-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }

/* ── IST COL ── */
.ist-col { text-align: right; flex-shrink: 0; }
.ist-badge { font-size: 9px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1px; }
.ist-time { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 800; color: var(--text-white); line-height: 1; }
.ist-date { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.done-badge {
  font-size: 10px; color: var(--text-muted); background: var(--bg-surface);
  border: 0.5px solid var(--border); padding: 2px 7px; border-radius: 4px;
  margin-top: 4px; display: inline-block;
}

/* ── EMPTY ── */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.match-count { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; min-height: 16px; }

/* ── FOOTER ── */
footer {
  border-top: 0.5px solid var(--border); padding: 18px 20px;
  text-align: center; color: var(--text-muted); font-size: 12px;
  max-width: 960px; margin: 0 auto;
}

/* ── MOBILE ── */
@media (max-width: 580px) {
  .stats-inner { grid-template-columns: repeat(2,1fr); }
  .match-card { grid-template-columns: 1fr; gap: 10px; }
  .ist-col { text-align: left; }
  .cd-tiles { flex-wrap: wrap; }
  .cd-tile { min-width: 56px; }
  .header-inner { gap: 8px; }
}
</style>
</head>
<body>

<!-- BYLINE -->
<div class="byline-bar">
  <span class="byline-text">crafted by <span>denz</span></span>
</div>

<!-- STICKY HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-text">World Cup 2026 <span class="logo-sub">· IST</span></span>
    </a>
    <div class="header-right">
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span class="live-label">Live</span>
      </div>
      <span class="updated-lbl" id="last-updated"></span>
      <button class="refresh-btn" onclick="manualRefresh()" title="Refresh scores">↻</button>
      <span class="theme-icon" onclick="toggleTheme()" title="Toggle theme" id="theme-icon">🌙</span>
    </div>
  </div>
</header>

<!-- COUNTDOWN HERO -->
<div class="countdown-hero">
  <div class="countdown-inner">
    <div class="cd-left">
      <div class="cd-eyebrow" id="cd-eyebrow">⏳ Next match</div>
      <div class="cd-matchup" id="cd-matchup">
        <span class="cd-team" id="cd-t1">Loading…</span>
      </div>
      <div class="cd-meta" id="cd-meta"></div>
    </div>
    <div class="cd-tiles" id="cd-tiles">
      <div class="cd-tile"><div class="cd-num" id="cd-d">--</div><div class="cd-lbl">Days</div></div>
      <div class="cd-tile"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">Hrs</div></div>
      <div class="cd-tile"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">Min</div></div>
      <div class="cd-tile"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">Sec</div></div>
    </div>
  </div>
</div>

<!-- FAVOURITE TEAM -->
<div class="fav-bar">
  <div class="fav-inner">
    <span class="fav-label">⭐ Favourite team:</span>
    <select class="fav-select" id="fav-select" onchange="setFavTeam(this.value)">
      <option value="">— Pick your team —</option>
    </select>
    <button class="fav-clear" id="fav-clear" onclick="clearFav()">✕ Clear</button>
    <span class="fav-hint" id="fav-hint"></span>
  </div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <div class="progress-meta">
      <span class="progress-text" id="prog-text">0 of 104 matches played</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<!-- DATE STRIP -->
<div class="date-strip-wrap">
  <div class="date-strip" id="date-strip"></div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-item">
      <div class="stat-num gold" id="s-played">0</div>
      <div class="stat-lbl">Played</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="s-today">0</div>
      <div class="stat-lbl">Today (IST)</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="s-remaining">104</div>
      <div class="stat-lbl">Remaining</div>
    </div>
    <div class="stat-item">
      <div class="stat-num red" id="s-goals">0</div>

const ALL_TEAMS = [...new Set(
  MATCHES.flatMap(m => {
    const p = m.match.split(' vs ');
    return p.length === 2 ? [p[0].trim(), p[1].trim()] : [];
  }).filter(t => !t.startsWith('Round') && !t.startsWith('Quarter') && !t.startsWith('Semi') && !t.startsWith('Third') && !t.startsWith('🏆'))
)].sort();

// ─── STATE ───
let scores = {};
let favTeam = localStorage.getItem('wc26_fav') || '';
let currentFilter = 'all';
let selectedDate = '';
let totalGoals = 0;
let scoresFetching = false;

// ─── THEME ───
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('wc26_theme', next);
  document.getElementById('theme-icon').textContent = next === 'dark' ? '🌙' : '☀️';
}
(function() {
  const saved = localStorage.getItem('wc26_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', () => {
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = saved === 'dark' ? '🌙' : '☀️';
  });
})();

// ─── IST NOW ───
function istNow() {
  const now = new Date();
  return new Date(now.getTime() + (now.getTimezoneOffset() + 330) * 60000);
}

// ─── INIT ───
function init() {
  buildFavSelect();
  buildDateStrip();
  applyFav(favTeam, false);
  updateCountdown();
  updateStats();
  render();
  fetchScores();
  setInterval(fetchScores, 90000);
  setInterval(tickCountdown, 1000);
}

// ─── FAV TEAM ───
function buildFavSelect() {
  const sel = document.getElementById('fav-select');
  ALL_TEAMS.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  if (favTeam) sel.value = favTeam;
}

function setFavTeam(val) {
  favTeam = val;
  localStorage.setItem('wc26_fav', val);
  applyFav(val, true);
}

function clearFav() {
  favTeam = '';
  localStorage.removeItem('wc26_fav');
  document.getElementById('fav-select').value = '';
  applyFav('', true);
}

function applyFav(team, rerender) {
  const clearBtn = document.getElementById('fav-clear');
  const hint = document.getElementById('fav-hint');
  const filterBtn = document.getElementById('fav-filter-btn');
  if (team) {
    clearBtn.classList.add('show');
    const cnt = MATCHES.filter(m => m.match.toLowerCase().includes(team.toLowerCase())).length;
    hint.textContent = `${cnt} match${cnt !== 1 ? 'es' : ''}`;
    filterBtn.textContent = `⭐ ${team}`;
    filterBtn.style.display = 'inline-flex';
  } else {
    clearBtn.classList.remove('show');
    hint.textContent = '';
    filterBtn.style.display = 'none';
    if (currentFilter === 'fav') { currentFilter = 'all'; activateFilterBtn('all'); }
  }
  if (rerender) { updateCountdown(); render(); }
}

// ─── DATE STRIP ───
const TOURNAMENT_DATES = [
  "June 11","June 12","June 13","June 14","June 15","June 16","June 17",
  "June 18","June 19","June 20","June 21","June 22","June 23","June 24",

  "July 1","July 2","July 3","July 4","July 5","July 6","July 7",
  "July 9","July 10","July 11","July 14","July 15","July 18","July 19"
];
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTH_DAYS = {
  "June 11":new Date(2026,5,11),"June 12":new Date(2026,5,12),"June 13":new Date(2026,5,13),
  "June 14":new Date(2026,5,14),"June 15":new Date(2026,5,15),"June 16":new Date(2026,5,16),
  "June 17":new Date(2026,5,17),"June 18":new Date(2026,5,18),"June 19":new Date(2026,5,19),

function buildDateStrip() {
  const strip = document.getElementById('date-strip');
  const today = istNow();
  const todayStr = today.toLocaleDateString('en-US', {month:'long', day:'numeric'}).replace(',','');
  const matchDates = new Set(MATCHES.map(m => m.date));
  const all = document.createElement('div');
  all.className = 'date-chip active'; all.dataset.d = '';
  all.innerHTML = `<div class="dc-day">ALL</div><div class="dc-num" style="font-size:12px;font-family:Inter,sans-serif;font-weight:700">Dates</div><div class="dc-dot"></div>`;
  all.onclick = () => selectDate('');
  strip.appendChild(all);
  TOURNAMENT_DATES.forEach(d => {
    const dateObj = MONTH_DAYS[d];
    if (!dateObj) return;
    const isToday = d === todayStr;
    const hasMatches = matchDates.has(d);
    const chip = document.createElement('div');
    chip.className = `date-chip${isToday ? ' today' : ''}${hasMatches ? ' has-matches' : ''}`;
    chip.dataset.d = d;
    chip.innerHTML = `<div class="dc-day">${DAY_NAMES[dateObj.getDay()]}</div><div class="dc-num">${dateObj.getDate()}</div><div class="dc-dot"></div>`;
    chip.onclick = () => selectDate(d);
    strip.appendChild(chip);
  });
}

function selectDate(d) {
  selectedDate = d;
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  const target = document.querySelector(`.date-chip[data-d="${d}"]`);
  if (target) { target.classList.add('active'); target.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'}); }
  render();
}

// ─── COUNTDOWN ───
function splitTeams(m) {
  const p = m.split(' vs ');
  if (p.length >= 2) return [p[0].trim(), p.slice(1).join(' vs ').trim()];
  return [m, ''];
}

function findNextMatch() {
  const now = Date.now();
  const upcoming = MATCHES.filter(m => m.kickoffISO && new Date(m.kickoffISO).getTime() > now);
  if (favTeam) {
    const favNext = upcoming.find(m => m.match.toLowerCase().includes(favTeam.toLowerCase()));
    if (favNext) return { match: favNext, isFav: true };
  }
  return upcoming.length ? { match: upcoming[0], isFav: false } : null;
}

function updateCountdown() {
  const result = findNextMatch();
  if (!result) {
    document.getElementById('cd-matchup').innerHTML = '<span class="cd-team">Tournament complete 🏆</span>';
    document.getElementById('cd-meta').textContent = '';
    document.getElementById('cd-tiles').style.display = 'none';
    return;
  }
  const { match: m, isFav } = result;
  const [t1, t2] = splitTeams(m.match);
  document.getElementById('cd-eyebrow').textContent = isFav ? `⭐ Next ${favTeam} match` : '⏳ Next match';

  const t1fav = favTeam && t1.toLowerCase().includes(favTeam.toLowerCase());
  const t2fav = favTeam && t2 && t2.toLowerCase().includes(favTeam.toLowerCase());

  document.getElementById('cd-matchup').innerHTML = t2 ?
    `<span class="cd-team${t1fav?' fav':''}">${t1}</span>
     <span class="cd-vs">vs</span>
     <span class="cd-team${t2fav?' fav':''}">${t2}</span>` :
    `<span class="cd-team">${t1}</span>`;
  document.getElementById('cd-meta').textContent = `${m.date}, 2026 · ${m.ist} IST · ${m.venue.split(',')[0]}`;
  document.getElementById('cd-tiles').style.display = 'flex';
  tickCountdown();
}

function tickCountdown() {
  const result = findNextMatch();
  if (!result) return;
  const diff = new Date(result.match.kickoffISO).getTime() - Date.now();
  if (diff <= 0) { updateCountdown(); return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const mi = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('cd-d').textContent = pad(d);
  document.getElementById('cd-h').textContent = pad(h);
  document.getElementById('cd-m').textContent = pad(mi);
  document.getElementById('cd-s').textContent = pad(s);
}

// ─── STATS ───
function updateStats() {
  const ist = istNow();
  const todayStr = ist.toLocaleDateString('en-US', {month:'long', day:'numeric'}).replace(',','');
  let played = 0, today = 0, remaining = 0;
  MATCHES.forEach(m => {
    const sc = scores[m.id];
    const done = sc && ['FT','AET','PEN'].includes(sc.status);
    if (done) played++; else remaining++;
    if (m.date === todayStr || m.istDate === todayStr) today++;
  });
  const pct = Math.round(played / 104 * 100);
  document.getElementById('s-played').textContent = played;
  document.getElementById('s-today').textContent = today;
  document.getElementById('s-remaining').textContent = remaining;
  document.getElementById('s-goals').textContent = totalGoals;
  document.getElementById('prog-text').textContent = `${played} of 104 matches played`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ─── FILTER ───
function setFilter(f, btn) {
  currentFilter = f;
  activateFilterBtn(f);
  selectedDate = '';
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  const allChip = document.querySelector('.date-chip[data-d=""]');
  if (allChip) allChip.classList.add('active');
  render();
}
function activateFilterBtn(f) {
  document.querySelectorAll('.pf').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.pf[data-filter="${f}"]`);
  if (btn) btn.classList.add('active');
}
function istHour(ist) {
  const m = ist.match(/(\d+):(\d+)\s*(am|pm)/i);
  if (!m) return -1;
  let h = parseInt(m[1]);
  const ampm = m[3].toLowerCase();
  if (ampm === 'pm' && h !== 12) h += 12;
  if (ampm === 'am' && h === 12) h = 0;
  return h + parseInt(m[2]) / 60;
}
function isMatchUpcoming(m) {
  if (!m.kickoffISO) return true;
  return new Date(m.kickoffISO).getTime() > Date.now();
}

// ─── RENDER ───
function render() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const ist = istNow();
  const todayStr = ist.toLocaleDateString('en-US', {month:'long', day:'numeric'}).replace(',','');

  const filtered = MATCHES.filter(m => {
    if (selectedDate && m.date !== selectedDate) return false;
    if (q) {
      const [t1, t2] = splitTeams(m.match);
      const inTeams = t1.toLowerCase().includes(q) || (t2 && t2.toLowerCase().includes(q));
      if (!inTeams) return false;
    }
    switch (currentFilter) {
      case 'group':    return m.phase === 'group';
      case 'ko':       return m.phase !== 'group';
      case 'fav':      return favTeam && m.match.toLowerCase().includes(favTeam.toLowerCase());
      case 'upcoming': return isMatchUpcoming(m);
      case 'today':    return m.date === todayStr || m.istDate === todayStr;
      case 'evening':  { const h = istHour(m.ist); return h >= 17 && h < 24; }
      case 'latenight':{ const h = istHour(m.ist); return h >= 0 && h < 8; }
      default: return true;
    }
  });

  let countLabel = `Showing ${filtered.length} of 104 matches`;
  if (q && filtered.length > 0) {
    const matchedTeamName = ALL_TEAMS.find(t => t.toLowerCase().includes(q));
    if (matchedTeamName) countLabel = `${filtered.length} match${filtered.length!==1?'es':''} for <strong>${matchedTeamName}</strong>`;
    else countLabel = `${filtered.length} match${filtered.length!==1?'es':''} matching "<strong>${q}</strong>"`;
  }
  document.getElementById('match-count').innerHTML = countLabel;

  const container = document.getElementById('schedule');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>
      <div>No matches found for "<strong>${q}</strong>"</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:6px">Try a country name like "Brazil", "Germany" or "France"</div>
    </div>`;
    return;
  }

  let html = '';
  let lastPhase = '';
  let phaseCount = {};
  filtered.forEach(m => { phaseCount[m.phase] = (phaseCount[m.phase] || 0) + 1; });

  filtered.forEach(m => {
    const ph = PHASES[m.phase];
    if (m.phase !== lastPhase) {
      html += `<div class="section-head">
        <span class="phase-pill" style="background:${ph.bg};color:${ph.color};border:0.5px solid ${ph.border}">${ph.label}</span>
        <span class="section-count">${phaseCount[m.phase]} match${phaseCount[m.phase]!==1?'es':''}</span>
      </div>`;
      lastPhase = m.phase;
    }

    const sc = scores[m.id];
    const isLive = sc && ['1H','HT','2H','ET','BT','P','INT'].includes(sc.status);
    const isDone = sc && ['FT','AET','PEN'].includes(sc.status);
    const [t1, t2] = splitTeams(m.match);
    const isFinal = m.phase === 'final';
    const isFavMatch = favTeam && m.match.toLowerCase().includes(favTeam.toLowerCase());
    const t1Fav = favTeam && t1.toLowerCase().includes(favTeam.toLowerCase());
    const t2Fav = favTeam && t2 && t2.toLowerCase().includes(favTeam.toLowerCase());

    let scoreHTML = '';
    if ((isLive || isDone) && sc.home !== null) {
      const liveStyle = isLive ? 'border-color:rgba(34,197,94,0.45);background:rgba(34,197,94,0.08)' : '';
      scoreHTML = `<div class="score-box" style="${liveStyle}">
        <span class="score-num">${sc.home}</span><span class="score-sep">–</span><span class="score-num">${sc.away}</span>
      </div>`;
    } else {
      scoreHTML = `<div class="score-box"><span class="vs-text">vs</span></div>`;
    }

    const liveLabel = isLive ? `<div class="live-badge"><span class="live-badge-dot"></span>${sc.status}${sc.minute ? ' '+sc.minute+"'" : ''}</div>` : '';
    const doneLabel = isDone ? `<div class="done-badge">Full time</div>` : '';

    html += `<div class="match-card${isLive?' live-card':''}${isFavMatch?' fav-card':''}${isFinal?' final-card':''}"
      style="${!isFavMatch&&!isFinal?`border-left:2px solid ${ph.color}22`:''}">
      <div>
        <div class="meta-date">📅 ${m.date}, 2026</div>
        <div class="meta-venue">📍 ${m.venue}</div>
        <div class="meta-utc">${m.utc}</div>
      </div>
      <div class="teams-col">
        <div class="teams-row">
          <div class="team left">
            <div class="team-name${t1Fav?' is-fav':''}">${t1}${t1Fav?' ⭐':''}</div>
          </div>
          ${scoreHTML}
          <div class="team right">
            <div class="team-name${t2Fav?' is-fav':''}">${t2||'—'}${t2Fav?' ⭐':''}</div>
          </div>
        </div>
        ${liveLabel}
      </div>
      <div class="ist-col">
        <div class="ist-badge">🇮🇳 IST</div>
        <div class="ist-time">${m.ist}</div>
        <div class="ist-date">${m.istDate}</div>
        ${doneLabel}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── LIVE SCORES via Claude AI ───
async function fetchScores() {
  if (scoresFetching) return;
  scoresFetching = true;
  const ist = istNow();
  const todayStr = ist.toLocaleDateString('en-US', {month:'long', day:'numeric'}).replace(',','');
  const tomorrowIST = new Date(ist.getTime() + 86400000);
  const tomorrowStr = tomorrowIST.toLocaleDateString('en-US', {month:'long', day:'numeric'}).replace(',','');
  const todayMatches = MATCHES.filter(m => m.date===todayStr || m.istDate===todayStr || m.date===tomorrowStr);
  if (!todayMatches.length) { scoresFetching = false; return; }
  const matchList = todayMatches.map(m => `ID ${m.id}: ${m.match} (${m.date}, ${m.utc})`).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: `You are a live sports data assistant. Search for FIFA World Cup 2026 scores. Today is ${new Date().toISOString()}. Respond ONLY with raw JSON (no markdown): {"matches":[{"id":1,"home":0,"away":2,"status":"FT","minute":null},...]}. Status: NS/1H/HT/2H/ET/PEN/FT/AET. Only include matches with actual scores.`,
        messages: [{ role:'user', content:`Get FIFA World Cup 2026 scores:\n${matchList}` }]
      })
    });
    if (!res.ok) { scoresFetching = false; return; }
    const data = await res.json();
    let text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const jsonMatch = text.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if (!jsonMatch) { scoresFetching = false; return; }
    const parsed = JSON.parse(jsonMatch[0]);
    totalGoals = 0;
    (parsed.matches||[]).forEach(s => {
      if (s.id && s.status) {
        scores[s.id] = {home:s.home, away:s.away, status:s.status, minute:s.minute};
        if (s.home!==null && s.away!==null && ['1H','HT','2H','ET','FT','AET','PEN'].includes(s.status)) totalGoals += (s.home||0)+(s.away||0);
      }
    });
    document.getElementById('last-updated').textContent = '· '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    updateStats(); render();
  } catch(e) { console.warn('Score fetch failed', e); }
  scoresFetching = false;
}

async function manualRefresh() {
  const btn = document.querySelector('.refresh-btn');
  if (btn) btn.classList.add('spinning');
  scoresFetching = false;
  await fetchScores();
  if (btn) btn.classList.remove('spinning');
}

init();
